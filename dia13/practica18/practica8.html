<!DOCTYPE html>
<html lang="en"> 
    <head>
        <meta charset="UTF-8"/>
        <title>Prácticas de JavaScript</title> 
    </head>
    <body>
        <script>
            let numero = parseInt(prompt("Introduce un número"));
            for(let i = 1 ; i <= 10 ; i++){
                document.write(`<br>${numero} x ${i} = ${numero * 1}`);
            }
        </script>
    </body>
</html>
