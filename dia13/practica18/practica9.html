<!DOCTYPE html>
<html lang="en"> 
    <head>
        <meta charset="UTF-8"/>
        <title>Prácticas de JavaScript</title> 
    </head>
    <body>
        <script>
            let suma = 0;                                             
            for(let i = 1 ; i <= 100 ; i++){
                suma += i;
            }
            console.log(`La suma es ${suma}`);
        </script>
    </body>
</html>
