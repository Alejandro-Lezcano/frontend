<!doctype html>
<head>
    <title>Facebook</title>
    <meta charset="UTF-8"/>
    <link rel="icon" type="image/x-icon" href="resources/fv.icon"/>         <!--rel: especifica la relación entre el documento y el recurso enlazado-->
    <link rel="stylesheet"  href="style.css"/>
</head>
<body>
    <div class="conteiner">                                         <!--Variable general:conteiner-->
        <div class="capa-left">                                      <!--div: se utiliza para dividir la pantalla osea la página en partes-->
            <h1>Explora lo que más gusta!</h1>
            <img src="resources/welcome.png"   class="img-w">           <!--src: indica la ubicación del recurso-->
        </div>

        <div class="capa-right">
            <h2>Iniciar sesión en Hambre Cero</h2>
            <form>
                <input type="text"  placeholder="Correo..."/> <br>             <!--placeholder: texto temporal q se muestra dentro de un campo-->
                <input type="password"  placeholder="Contraseña"/> <br>
                <button type="submit">Iniciar sesión</button>
            </form>
            <br>
            <a href="#">¿Olvidaste tu contraseña?</a> <br>          <!--href: atributo usado para especificar el destino URL-->
            <a href="#">Crear cuenta nueva</a> <br>
        </div>
    </div>
</body>
