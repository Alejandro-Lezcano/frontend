<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <title>Menú Tailwind</title>
</head>
<body class="bg-gray-100">
    <div class="flex min-h-screen">
        <aside class="w-64 bg-slate-800 text-white">
            <div class="p-6 text-2xl font-bold border-b border-slate-700">
                KambiStyle
            </div>
            <nav class="mt-4">
                <a href="#" class="flex items-center px-6 py-3 hover:bg-slate-700 transition">
                    <i class="fa-solid fa-house w-6"></i>
                    <span>Inicio</span>
                </a>

                <a href="#" class="flex items-center px-6 py-3 hover:bg-slate-700 transition">
                    <i class="fa-solid fa-users w-6"></i>
                    <span>Usuarios</span>
                </a>

                <a href="#" class="flex items-center px-6 py-3 hover:bg-slate-700 transition">
                    <i class="fa-solid fa-box w-6"></i>
                    <span>Productos</span>
                </a>

                <a href="#" class="flex items-center px-6 py-3 hover:bg-slate-700 transition">
                    <i class="fa-solid fa-cart-shopping w-6"></i>
                    <span>Ventas</span>
                </a>

                <a href="#" class="flex items-center px-6 py-3 hover:bg-slate-700 transition">
                    <i class="fa-solid fa-chart-line w-6"></i>
                    <span>Reportes</span>
                </a>

                <a href="#" class="flex items-center px-6 py-3 hover:bg-slate-700 transition">
                    <i class="fa-solid fa-gear w-6"></i>
                    <span>Configuración</span>
                </a>
            </nav>
        </aside>
        <main class="flex-1 p-8">
            <h1 class="text-3xl font-bold mb-4">
                Panel Principal
            </h1>

            <p class="text-gray-600">
                Bienvenido al sistema.
            </p>
        </main>
    </div>
</body>
</html>
