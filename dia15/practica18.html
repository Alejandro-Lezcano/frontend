<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8"/>
        <title>Nro mayor</title>
    </head>
    <body>
        <script>
            function mayor(a, b, c){
                return Math.max(a, b, c);
            }
            function raizCuadrada(a){
                return Math.sqrt(a);
            }
            document.write("Mayor : "+ mayor(5, 7, 8));
            document.write("<br>Raíz cuadrada: " + raizCuadrada(25));
        </script>
    </body>
</html>
