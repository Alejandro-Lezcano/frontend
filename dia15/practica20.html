<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8"/>
        <title>Cuenta Regresiva</title>
    </head>
    <body>
        <script>
            let i = 0;
            let intervalo = setInterval(() => {
                document.write(i);
                i++;
                if(i > 10) clearInterval(intervalo);
            }, 1000);
        </script>
    </body>
</html>
