<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8"/>
        <title>Prácticas de JavaScript</title> 
    </head>
    <body>
        <script>
            let num1 = 10;          //let: variable local
            let num2 = 5;
            let operacion = '+';
            let resultado;

            if(operacion === '+') resultado = num1 + num2;
            else if(operacion === '-') resultado = num1 - num2;
            else if(operacion === '*') resultado = num1 * num2;
            else if(operacion === '/') resultado = num1 / num2;

            console.log("Resultado:", resultado); 
        </script>
    </body>
</html>
