<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8"/>
        <title>Prácticas de JavaScript</title> 
    </head>
    <body>
        <script>
            let numero = parseInt(prompt("Introduce un número:"));
            if(numero % 2 === 0){
                console.log("Es par");
            } else{
                console.log("Es impar");
            }
        </script>
    </body>
</html>
