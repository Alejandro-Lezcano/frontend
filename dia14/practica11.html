<!DOCTYPE html>
<html>

        <title>Práctica 11</title>

    <body>
        <script>
            let secreto = Math.floor(Math.random() * 10 ) + 1 ;
            do{
                intento = parseInt(prompt("Adivina el número del 1 al 10"))
            }while(secreto !== intento);
            console.log("Correcto!")
        </script>
