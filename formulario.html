<!DOCTYPE html>
<html>
    <head>
        <title>Registro de Productos</title>
        <meta charset="UTF-8"/>
        <link rel="stylesheet" href="css/bootstrap.min.css"/>
    </head>
    <body>
        <h2>Formulario de Registro de Productos</h2>
        <form action="#" method="post" enctype="multipart/form-data">
        
            <label for="codigoBarra">Código de Barra:</label><br>
            <input type="text" id="codigoBarra" name="codigoBarra" required><br><br>

            <label for="nombre">Nombre:</label><br>
            <input type="text" id="nombre" name="nombre" required><br><br>

            <label for="categoria">Categoría:</label><br>
            <select id="categoria" name="categoria" required>
                <option value="">-- Seleccione --</option>
                <option value="lacteos">Lácteos</option>
                <option value="panificados">Panificados</option>
                <option value="embutidos">Embutidos</option>
            </select><br><br>

            <label for="descripcion">Descripción</label><br>
            <textarea id="descripcion" name="descripcion" rows="4" cols="40"></textarea><br><br>

            <label for="precio">Precio Unitario:</label><br>
            <input type="number" id="precio" name="precio" step="0.01" required><br><br>

            <label for="iva">IVA</label><br>
            <select id="iva" name="iva" required>
                <option value="">-- Seleccione --</option>
                <option value="evento">Evento</option>
                <option value="iva10">IVA 10%</option>
                <option value="iva5">IVA 5%</option>
            </select><br><br>

            <label for="foto">Foto del Producto:</label><br>
            <input type="file" id="foto" name="foto" accept="image/*"><br><br>

            <button type="submit">Guardar</button>
            <button type="reset">Resetear</button>

        </form>
    </body>
</html>
