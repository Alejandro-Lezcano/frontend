<!DOCTYPE html>
<html>
    <head>
        <title>Registro de cliente</title>
        <meta charset="UTF-8"/>
        <link rel="stylesheet"  href="style.css"/>    
        <link rel="icon" href="resources/fv.ico"/>
    </head>
    <body>
        <h1>Registro de cliente</h1>
        <form method="post" action="guardar-cliente">
            <input type="text" placeholder="Nombre y Apellido"  required    autofocus/> <br>
            <label>Fecha de nacimiento</label>         
            <input type="date"/> <br>
            <select>
                <option disabled selected>Elige tu ciudad</option>
                <option>Asunción</option>
                <option>San Bernardino</option>
            </select>
            <textarea placeholder="Escribe una dirección"></textarea> <br>
            <iframe width="300" height="200" src="https://www.openstreetmap.org/export/embed.html?bbox=-73.45458984375001%2C-29.20971322586817%2C-48.93310546875001%2C-17.581194026506008&amp;layer=mapnik" style="border: 1px solid black"></iframe><br/><small><a href="https://www.openstreetmap.org/?#map=6/-23.52/-61.19">Ver el mapa más grande</a></small>
            <input type="text"   placeholder="Teléfono celular"/> <br>
            <input type="email"   placeholder="Correo electrónico"/> <br>
            <label>Género</label>
            <input type="radio" name="género">Hombre <br>
            <input type="radio" name="género">Mujer <br>
            <input type="radio" name="género">Therians <br>
            <button class="btn btn-envio">Enviar</button>
        </form>
    </body>
    <script></script>
</html>
